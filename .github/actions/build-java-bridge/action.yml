name: Build java-bridge
description: JDK 설정 및 java-bridge 모듈 빌드

runs:
  using: composite
  steps:
    - name: JDK 17 설정
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle 캐시
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 빌드
      run: ./gradlew :java-bridge:build
      shell: bash
