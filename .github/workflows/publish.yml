name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: C++ 코어 빌드
        uses: ./.github/actions/build-core

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Secrets 로드
        uses: actions/checkout@v4
        with:
          repository: 'dev-montyoh/secrets-store'
          token: ${{ secrets.SECRETS_STORE_ACCESS_TOKEN }}
          path: secrets-store

      - name: Load secrets
        uses: ./secrets-store/.github/actions/load-secrets
        with:
          SECRETS_STORE_ACCESS_TOKEN: ${{ secrets.SECRETS_STORE_ACCESS_TOKEN }}

      - name: GPG 키 설정
        run: |
          # gpg-agent가 loopback pinentry를 허용하도록 설정
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          # GPG 키 임포트 (base64 디코딩 후 gpg에 직접 주입)
          echo "$GPG_KEY_B64" | base64 --decode | gpg --batch --import
          gpg-connect-agent reloadagent /bye || true
          # Gradle 서명 설정을 gradle.properties에 기록
          mkdir -p ~/.gradle
          echo "signing.gnupg.keyName=$GPG_KEY_ID_VAL" >> ~/.gradle/gradle.properties
          echo "signing.gnupg.passphrase=$GPG_PASS_VAL" >> ~/.gradle/gradle.properties
        env:
          GPG_KEY_B64: ${{ env.GPG_PRIVATE_KEY }}
          GPG_KEY_ID_VAL: ${{ env.GPG_KEY_ID }}
          GPG_PASS_VAL: ${{ env.GPG_PASSPHRASE }}

      - name: Maven Central 배포
        run: |
          # 1단계: 로컬 스테이징 디렉토리에 서명된 아티팩트 배포
          ./gradlew :java-bridge:publishMavenPublicationToStagingRepository

          # 2단계: 스테이징 디렉토리를 ZIP 번들로 압축
          cd java-bridge/build/staging-deploy
          zip -r ../bundle.zip .
          cd -

          # 3단계: Sonatype Central Portal API에 번들 업로드 (AUTOMATIC 자동 릴리즈)
          BUNDLE_AUTH=$(printf '%s:%s' "$SONATYPE_USER" "$SONATYPE_PASS" | base64 -w0)
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $BUNDLE_AUTH" \
            --form bundle=@java-bridge/build/bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"
        env:
          SONATYPE_USER: ${{ env.SONATYPE_USERNAME }}
          SONATYPE_PASS: ${{ env.SONATYPE_PASSWORD }}
